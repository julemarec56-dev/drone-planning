<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Cellule Appui Drone</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 28px 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border: 1px solid #0f3460;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #0f3460;
    }

    .header img {
      height: 90px;
      width: auto;
      flex-shrink: 0;
    }

    .header-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .header h1 {
      font-size: 1.15rem;
      color: #e0e0e0;
      font-weight: 700;
      line-height: 1.2;
      margin: 0;
    }

    .header h1 span {
      display: block;
      font-size: 0.8rem;
      color: #7a8baa;
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .date {
      font-size: 1rem;
      color: #a0aec0;
      margin-bottom: 22px;
      padding-left: 2px;
      font-weight: 500;
    }

    .indicators {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .indicator {
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      opacity: 0.35;
    }

    .indicator.ok { opacity: 1; }

    .indicator.TPJ { background: #1a2f5e; }
    .indicator.TPN { background: #c0390b; }
    .indicator.OLJ { background: #d4e84a; }
    .indicator.OLN { background: #6a2fa0; }

    .indicator .label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .indicator.TPJ .label,
    .indicator.TPN .label,
    .indicator.OLN .label { color: rgba(255,255,255,0.7); }
    .indicator.OLJ .label { color: rgba(0,0,0,0.6); }

    .indicator .code {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .indicator.TPJ .code,
    .indicator.TPN .code,
    .indicator.OLN .code { color: #ffffff; }
    .indicator.OLJ .code { color: #1a1a1a; }

    .indicator .status { font-size: 1.4rem; }

    .indicator .value {
      font-size: 0.72rem;
      margin-top: 4px;
    }

    .indicator.TPJ .value,
    .indicator.TPN .value,
    .indicator.OLN .value { color: rgba(255,255,255,0.8); }
    .indicator.OLJ .value { color: rgba(0,0,0,0.7); }

    .indicator .noms {
      font-size: 0.95rem;
      font-weight: 600;
      margin-top: 6px;
      line-height: 1.6;
    }

    .indicator.TPJ .noms,
    .indicator.TPN .noms,
    .indicator.OLN .noms { color: rgba(255,255,255,0.9); }
    .indicator.OLJ .noms { color: rgba(0,0,0,0.8); }

    .footer {
      margin-top: 20px;
      font-size: 0.7rem;
      color: #4a5568;
      text-align: center;
    }

    .admin-link {
      display: block;
      margin-top: 10px;
      font-size: 0.65rem;
      color: #2a3550;
      text-align: center;
      text-decoration: none;
    }

    .admin-link:hover { color: #4a5568; }

    .loading {
      text-align: center;
      color: #7a8baa;
      padding: 20px;
    }

    .error {
      text-align: center;
      color: #e94560;
      padding: 20px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <img src="./logo.svg" alt="Logo Cellule Drone SDIS 56">
    <div class="header-text">
      <h1>Cellule Appui Drone<span>SDIS 56</span></h1>
    </div>
  </div>
  <div class="date" id="date-display">Chargement...</div>

  <div id="content">
    <div class="loading">Chargement des données...</div>
  </div>

  <div class="footer">Données extraites depuis AGATT · Mise à jour quotidienne à 6h00</div>
  <a class="admin-link" href="./admin.html">⚙</a>
</div>

<script>
  const INDICATORS = [
    { key: "TPJ", label: "Télépilote Jour" },
    { key: "TPN", label: "Télépilote Nuit" },
    { key: "OLJ", label: "Officier de Liaison Jour" },
    { key: "OLN", label: "Officier de Liaison Nuit" }
  ];

  const isDemain = new URLSearchParams(window.location.search).get("demain") === "1";
  const DATA_URL = isDemain ? "./agatt_data_demain.json" : "./agatt_data.json";

  async function loadData() {
    const dateEl = document.getElementById("date-display");
    const contentEl = document.getElementById("content");

    try {
      const res = await fetch(DATA_URL + "?t=" + Date.now());
      if (!res.ok) throw new Error("Fichier introuvable");
      const data = await res.json();

      const date = new Date(data.date);
      dateEl.textContent = "Planning du " + date.toLocaleDateString("fr-FR", {
        weekday: "long", day: "numeric", month: "long", year: "numeric"
      });

      let html = '<div class="indicators">';
      for (const ind of INDICATORS) {
        const val = data[ind.key];
        const ok = val === 1;
        const noms = data[ind.key + "_noms"] || [];
        const nomsHtml = ok && noms.length > 0
          ? `<div class="noms">${noms.join("<br>")}</div>`
          : `<div class="value">${ok ? "Disponible" : "Non disponible"}</div>`;
        html += `
          <div class="indicator ${ind.key} ${ok ? "ok" : "ko"}">
            <div class="label">${ind.label}</div>
            <div class="code">${ind.key}</div>
            <div class="status">${ok ? "✅" : "❌"}</div>
            ${nomsHtml}
          </div>`;
      }
      html += '</div>';
      contentEl.innerHTML = html;

    } catch (e) {
      dateEl.textContent = "";
      contentEl.innerHTML = `<div class="error">⚠️ Impossible de charger les données.<br>Vérifiez que agatt_data.json est présent.</div>`;
    }
  }

  loadData();
</script>

</body>
</html>
