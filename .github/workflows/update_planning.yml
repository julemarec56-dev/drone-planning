name: Mise à jour planning drone

on:
  workflow_dispatch:  # déclenchement manuel via bouton admin
  schedule:
    - cron: '0 5 * * *'   # 6h00 heure française (UTC+1) = 5h UTC
    - cron: '0 13 * * *'  # 15h00 heure française (UTC+2 en été) = 13h UTC

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      - name: Lancer le scraper
        env:
          AGATT_USER: ${{ secrets.AGATT_USER }}
          AGATT_PASSWORD: ${{ secrets.AGATT_PASSWORD }}
          AGATT_GITHUB_TOKEN: ${{ secrets.AGATT_GITHUB_TOKEN }}
        run: python agatt_scraper.py
